name: ai_expense_tracker
description: AI-powered expense tracking application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  go_router: ^14.1.0
  flutter_riverpod: ^2.5.1

  # UI & Design
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

  # Database & Storage
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2
  shared_preferences: ^2.5.5

  # Authentication
  google_sign_in: ^6.2.1
  firebase_auth: ^4.19.0
  firebase_core: ^2.31.0

  # Firebase Services
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0

  # Image & ML
  camera: ^0.10.5+9
  image_picker: ^1.1.1
  google_mlkit_text_recognition: ^0.11.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  flutter_svg: ^2.0.10+1
  lottie: ^3.3.3
  flutter_screenutil: ^5.9.3
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/lottie/