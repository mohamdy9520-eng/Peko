name: ai_expense_tracker
description: AI-powered expense tracking application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Notifications
  timezone: ^0.9.0
  permission_handler: ^11.3.1
  flutter_speed_dial: ^3.0.5
  go_router: ^14.1.0
  flutter_riverpod: ^2.5.1
  easy_localization: ^3.0.7
  firebase_messaging: 14.9.4
  url_launcher: ^6.3.1
  # Add these:
  image: ^4.2.0
  fluttermoji: ^1.0.2
  local_auth: ^2.1.8
  device_info_plus: ^9.1.2
  flutter_secure_storage: ^9.0.0
  otp: ^3.1.4
  qr_flutter: ^4.1.0
  crypto: ^3.0.3
  encrypt: ^5.0.1
  
  # UI & Design
  google_fonts: ^8.1.0
  fl_chart: ^0.65.0
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.4.0

  # Database & Storage
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5

  # Authentication
  google_sign_in: ^6.2.1
  firebase_auth: ^4.19.0
  firebase_core: ^2.31.0

  # Firebase Services
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0

  # Image & ML
  camera: ^0.10.5+9
  image_picker: ^1.1.1
  google_mlkit_text_recognition: ^0.15.1
  http: ^1.6.0
  printing: ^5.13.1
  screenshot: ^3.0.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  flutter_svg: ^2.0.10+1
  lottie: ^3.3.3
  flutter_screenutil: ^5.9.3
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  share_plus: ^10.0.0
  archive: ^4.0.9
  pdf: ^3.12.0
  flutter_markdown_plus: ^1.0.7
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_dotenv: ^6.0.1
  currency_picker: ^2.0.22
  provider: ^6.1.5+1
  purchases_flutter: ^8.11.0
  purchases_ui_flutter: ^8.11.0
  firebase_remote_config: ^4.4.7


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/lottie/
    - assets/icon/pēco.png
    - .env
    - assets/translations/

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icon/pēco.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/pēco.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/pēco.png

  android_12:
    image: assets/icon/pēco.png
    color: "#FFFFFF"
